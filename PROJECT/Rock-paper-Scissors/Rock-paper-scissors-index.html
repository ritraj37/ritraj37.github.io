<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rock Paper Scissors Pro</title>
  <style>
    /* ===== PROJECT NAVBAR ===== */
    .proj-nav {
      position: fixed; top: 0; left: 0; width: 100%; z-index: 999;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(99,102,241,0.12);
      box-shadow: 0 2px 12px rgba(99,102,241,0.08);
    }
    .proj-nav-inner {
      max-width: 1100px; margin: 0 auto;
      padding: 0 24px; height: 58px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .proj-nav-brand {
      font-family: 'Segoe UI', sans-serif;
      font-size: 1.1rem; font-weight: 800;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; text-decoration: none;
    }
    .proj-nav-title {
      font-size: 0.85rem; font-weight: 600; color: #6b7280;
      background: rgba(99,102,241,0.08);
      padding: 4px 14px; border-radius: 999px;
      border: 1px solid rgba(99,102,241,0.15);
    }
    .proj-nav-back {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.85rem; font-weight: 600;
      color: #6366f1; text-decoration: none;
      padding: 7px 16px; border-radius: 10px;
      border: 1.5px solid #e0e7ff; background: #fafbff;
      transition: all 0.2s;
    }
    .proj-nav-back:hover { background: #eef2ff; border-color: #6366f1; }
    /* ========================= */
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding-top: 58px;
    }
    h1 {
      font-size: 2.5em;
      margin-bottom: 20px;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
    }
    .choices {
      display: flex;
      gap: 20px;
      margin: 20px;
    }
    .choice-btn {
      background: #fff;
      color: #333;
      border: none;
      border-radius: 12px;
      padding: 20px;
      font-size: 18px;
      cursor: pointer;
      transition: transform 0.2s, background 0.3s;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }
    .choice-btn:hover {
      transform: scale(1.1);
      background: #f39c12;
      color: #fff;
    }
    .result, .score {
      font-size: 20px;
      margin-top: 15px;
      text-align: center;
    }
    .highlight {
      font-weight: bold;
      color: #f1c40f;
    }
    .game-box {
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.4);
      text-align: center;
    }
    /* Congratulations popup */
    .popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #27ae60;
      color: #fff;
      padding: 30px 50px;
      border-radius: 12px;
      font-size: 24px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.5);
      display: none;
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }
  </style>
</head>
<body>
  <nav class="proj-nav">
    <div class="proj-nav-inner">
      <a href="../../index.html" class="proj-nav-brand">Ritu Raj</a>
      <span class="proj-nav-title">Rock Paper Scissors</span>
      <a href="../../index.html#mini-projects" class="proj-nav-back">&#8592; Back to Portfolio</a>
    </div>
  </nav>
  <div class="game-box">
    <h1>Rock Paper Scissors</h1>
    <div class="choices">
      <button class="choice-btn" onclick="play('Rock')">✊ Rock</button>
      <button class="choice-btn" onclick="play('Paper')">✋ Paper</button>
      <button class="choice-btn" onclick="play('Scissors')">✌️ Scissors</button>
    </div>
    <div class="result" id="result">Make your move!</div>
    <div class="score" id="score">Player: 0 | Computer: 0</div>
  </div>

  <!-- Popup -->
  <div class="popup" id="popup">🎉 Congratulations, You Won! 🎉</div>

  <script>
    let playerScore = 0;
    let computerScore = 0;

    function play(playerChoice) {
      const choices = ["Rock", "Paper", "Scissors"];
      const computerChoice = choices[Math.floor(Math.random() * 3)];
      let resultText = "";

      if (playerChoice === computerChoice) {
        resultText = "It's a Tie!";
      } else if (
        (playerChoice === "Rock" && computerChoice === "Scissors") ||
        (playerChoice === "Paper" && computerChoice === "Rock") ||
        (playerChoice === "Scissors" && computerChoice === "Paper")
      ) {
        resultText = "You Win!";
        playerScore++;
        showPopup(); // Show congratulations popup
      } else {
        resultText = "You Lose!";
        computerScore++;
      }

      document.getElementById("result").innerHTML =
        `Computer chose <span class="highlight">${computerChoice}</span><br>${resultText}`;
      document.getElementById("score").innerHTML =
        `Player: ${playerScore} | Computer: ${computerScore}`;
    }

    function showPopup() {
      const popup = document.getElementById("popup");
      popup.style.display = "block";
      setTimeout(() => {
        popup.style.display = "none"; // Hide after 2 seconds
      }, 2000);
    }
  </script>
</body>
</html>
