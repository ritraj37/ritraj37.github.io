<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Generator</title>
  <style>
    /* ===== PROJECT NAVBAR ===== */
    .proj-nav {
      position: fixed; top: 0; left: 0; width: 100%; z-index: 999;
      background: rgba(255,255,255,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(99,102,241,0.12);
      box-shadow: 0 2px 12px rgba(99,102,241,0.08);
    }
    .proj-nav-inner {
      max-width: 1100px; margin: 0 auto; padding: 0 24px; height: 58px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .proj-nav-brand {
      font-size: 1.1rem; font-weight: 800;
      background: linear-gradient(135deg,#6366f1,#8b5cf6);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; text-decoration: none;
    }
    .proj-nav-title {
      font-size: 0.85rem; font-weight: 600; color: #6b7280;
      background: rgba(99,102,241,0.08); padding: 4px 14px;
      border-radius: 999px; border: 1px solid rgba(99,102,241,0.15);
    }
    .proj-nav-back {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.85rem; font-weight: 600; color: #6366f1;
      text-decoration: none; padding: 7px 16px; border-radius: 10px;
      border: 1.5px solid #e0e7ff; background: #fafbff; transition: all 0.2s;
    }
    .proj-nav-back:hover { background: #eef2ff; border-color: #6366f1; }
    /* ========================= */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #8b5cf6, #a78bfa);
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: 58px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px;
      width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    h1 { font-size: 1.6rem; color: #1f2937; margin-bottom: 6px; }
    p  { font-size: 0.9rem; color: #6b7280; margin-bottom: 24px; }

    .output-box {
      display: flex;
      align-items: center;
      background: #f3f4f6;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 20px;
      gap: 10px;
    }
    #password-output {
      flex: 1;
      font-size: 1rem;
      font-family: monospace;
      color: #111827;
      background: none;
      border: none;
      outline: none;
      word-break: break-all;
    }
    #copy-btn {
      background: #8b5cf6;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    #copy-btn:hover { background: #7c3aed; }

    .option-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .option-row label { font-size: 0.9rem; color: #374151; font-weight: 500; }
    input[type="checkbox"] { width: 18px; height: 18px; accent-color: #8b5cf6; cursor: pointer; }

    .length-row { margin-bottom: 20px; }
    .length-row label { font-size: 0.9rem; color: #374151; font-weight: 500; display: flex; justify-content: space-between; }
    input[type="range"] { width: 100%; margin-top: 8px; accent-color: #8b5cf6; }

    #generate-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
    }
    #generate-btn:hover { opacity: 0.9; transform: translateY(-2px); }

    .copied-msg {
      text-align: center;
      color: #10b981;
      font-size: 0.85rem;
      font-weight: 600;
      margin-top: 12px;
      height: 20px;
    }
  </style>
</head>
<body>
  <nav class="proj-nav">
    <div class="proj-nav-inner">
      <a href="../../index.html" class="proj-nav-brand">Ritu Raj</a>
      <span class="proj-nav-title">Password Generator</span>
      <a href="../../index.html#mini-projects" class="proj-nav-back">&#8592; Back to Portfolio</a>
    </div>
  </nav>
  <div class="card">
    <p>Generate a secure random password instantly.</p>

    <div class="output-box">
      <input type="text" id="password-output" readonly placeholder="Click Generate...">
      <button id="copy-btn" onclick="copyPassword()">Copy</button>
    </div>

    <div class="length-row">
      <label>
        Password Length
        <span id="length-val">12</span>
      </label>
      <input type="range" id="length" min="6" max="32" value="12" oninput="document.getElementById('length-val').textContent=this.value">
    </div>

    <div class="option-row">
      <label>Include Uppercase (A-Z)</label>
      <input type="checkbox" id="uppercase" checked>
    </div>
    <div class="option-row">
      <label>Include Lowercase (a-z)</label>
      <input type="checkbox" id="lowercase" checked>
    </div>
    <div class="option-row">
      <label>Include Numbers (0-9)</label>
      <input type="checkbox" id="numbers" checked>
    </div>
    <div class="option-row">
      <label>Include Symbols (!@#$)</label>
      <input type="checkbox" id="symbols">
    </div>

    <button id="generate-btn" onclick="generatePassword()">Generate Password</button>
    <div class="copied-msg" id="copied-msg"></div>
  </div>

  <script>
    function generatePassword() {
      const upper   = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      const lower   = 'abcdefghijklmnopqrstuvwxyz';
      const nums    = '0123456789';
      const symbols = '!@#$%^&*()_+-=[]{}|;:,.<>?';
      let chars = '';
      if (document.getElementById('uppercase').checked) chars += upper;
      if (document.getElementById('lowercase').checked) chars += lower;
      if (document.getElementById('numbers').checked)   chars += nums;
      if (document.getElementById('symbols').checked)   chars += symbols;
      if (!chars) { alert('Select at least one option!'); return; }
      const len = parseInt(document.getElementById('length').value);
      let pwd = '';
      for (let i = 0; i < len; i++) pwd += chars[Math.floor(Math.random() * chars.length)];
      document.getElementById('password-output').value = pwd;
      document.getElementById('copied-msg').textContent = '';
    }

    function copyPassword() {
      const val = document.getElementById('password-output').value;
      if (!val) return;
      navigator.clipboard.writeText(val).then(() => {
        document.getElementById('copied-msg').textContent = 'Copied to clipboard!';
        setTimeout(() => document.getElementById('copied-msg').textContent = '', 2000);
      });
    }

    generatePassword();
  </script>
</body>
</html>
